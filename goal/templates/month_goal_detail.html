<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }

    button {
        margin: 5px;
        padding: 10px 20px;
        cursor: pointer;
    }
</style>
<body>
    <div>年: {{month_goal.year_goal.year.year}}</div>
    <div>月: {{month_goal.month}}</div>
    <div>月目標のタイトル: {{month_goal.title}}</div>
    <h2>Todos</h2>
        {% if todos %}
            <ul>
                {% for todo in todos %}
                    <li>タイトル: {{ todo.title }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>未設定</p>
        {% endif %}
    <div id="achieve-button" style="display: block">
        <button onclick="handleAchieveClick({{ month_goal.to_dict }})">達成済みにする</button>
    </div>
    <div id="achieve-message" style="display: none">
        <p>達成</p>
    </div>
    <p id="error-message" style="color: red;"></p> <!-- エラー表示用 -->
    <!-- モーダルの構造 -->
    <div id="modal">
        <div id="modal-content">
            <p>この月目標には未達成のToDoがあります。強制的に達成にすると、下のToDoも一括で完了となります。よろしいですか？</p>
            <button id="confirm-button">はい、強制達成する</button>
            <button id="cancel-button">いいえ、キャンセル</button>
        </div>
    </div>
</body>
<script>
    async function checkIfTodosAchieved(year, month) {
        try {
            const response = await fetch(`/goal/year_goal/${year}/month_goal/${month}/has_unachieved_todos/`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                },
            });

            if (!response.ok) {
                throw new Error("Failed to fetch data");
            }
            const data = await response.json();
            if (data) {
                return data.has_unachieved_todos;
            }
            return false;
        } catch (error) {
            console.error('Error:', error);
            document.getElementById("error-message").textContent = error.message || "状態変更に失敗しました";
        }
    }

    async function handleAchieveClick(monthGoal) {
        const { id, month, yearGoal } = monthGoal;
        console.log(yearGoal)

        const result = await checkIfTodosAchieved(yearGoal.year, month);
        if (!result) {
            markGoalAsAchieve(id, yearGoal, month);
        } else {
            // モーダルを表示
            document.getElementById("modal").style.display = "flex";
            document.getElementById("confirm-button").onclick = async function() {
                await markGoalAsAchieve(id, yearGoal, month);
                // モーダルを閉じる
                hideModal();
            };
            document.getElementById("cancel-button").onclick = function() {
                // モーダルを閉じる
                hideModal();
            };
        }
    }

    function hideModal() {
        document.getElementById("modal").style.display = "none";
    }

    async function markGoalAsAchieve(id, yearGoal, month) {
        try {
            const response = await fetch(`/goal/year_goal/${yearGoal.year}/month_goal/${month}/achieve/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ month_id: id })
            });

            if (!response.ok) {
                throw new Error("Failed to Achieve goal");
            }

            const data = await response.json();
            console.log("Success:", data);
            document.getElementById("achieve-button").style.display = "none";
            document.getElementById("achieve-message").style.display = "block";
        } catch (error) {
            console.error('Error:', error);
            document.getElementById("error-message").textContent = error.message || "状態変更に失敗しました";
        }
    }
</script>
</html>
