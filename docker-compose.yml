services:
  app:
    build:
      context: .
      dockerfile: ./infra/app/Dockerfile
    working_dir: "/usr/src/app"
    tty: true
    command: sh -c "python manage.py makemigrations && \
            python manage.py migrate && \
            python manage.py collectstatic --noinput && \
            python manage.py loaddata message.json && \
            python manage.py runserver 0.0.0.0:8000" # サーバー起動コマンドを追加
    volumes:
      - ./:/usr/src/app
    ports:
      - "8080:8000"
    depends_on:
      db: # dbサービスが先に起動している必要がある
        condition: service_healthy

  db:
    build:
      context: .
      dockerfile: ./infra/db/Dockerfile
    tty: true
    volumes:
      - ./infra/db/db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u ${MYSQL_USER} -p${MYSQL_PASSWORD} || exit 1",
        ]
      interval: 3s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    ports:
      - "80:80" # ホストのポート80をNginXにマッピング
    volumes:
      - ./infra/nginx/fnginx.conf:/etc/nginx/conf.d/default.conf # NginX設定ファイルのマウント
      - ./staticfiles:/usr/src/app/staticfiles # 静的ファイルをマウント
    depends_on:
      - app # appサービスが先に起動している必要がある
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    # コンテナ内の環境変数を.envを使って設定
    env_file:
      - .env
    links:
      - db
    ports:
      - 4000:80
    volumes:
      - ./phpmyadmin/sessions:/sessions